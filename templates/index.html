<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DjepetoTip</title>

<link rel="manifest" href="/static/manifest.json">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111827;
padding:18px;
font-size:24px;
color:#f97316;
font-weight:bold;
}

.tabs{
display:flex;
overflow:auto;
background:#1e293b;
}

.tab{
padding:12px;
white-space:nowrap;
}

.container{
padding:15px;
}

.match{
display:flex;
justify-content:space-between;
background:#1e293b;
padding:12px;
margin-bottom:8px;
border-radius:8px;
}

.tip{
font-weight:bold;
font-size:18px;
}

.tip1{color:#22c55e;}
.tipx{color:#facc15;}
.tip2{color:#ef4444;}

</style>

</head>

<body>

<header>⚽ DjepetoTip</header>

<div class="tabs">

{% for league in leagues.keys() %}
<div class="tab">{{league}}</div>
{% endfor %}

</div>

<div class="container">

{% for league, matches in leagues.items() %}

<h3>{{league}}</h3>

{% for m in matches %}

<div class="match">

<div>
{{m.home}} vs {{m.away}} <br>
AI {{m.prob}}%
</div>

<div class="tip
{% if m.tip == '1' %}tip1{% endif %}
{% if m.tip == 'X' %}tipx{% endif %}
{% if m.tip == '2' %}tip2{% endif %}
">

{{m.tip}}

</div>

</div>

{% endfor %}

{% endfor %}

</div>

</body>
</html>
