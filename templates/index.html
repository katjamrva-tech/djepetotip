<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DjepetoTip</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#111827;
padding:18px;
font-size:24px;
color:#f97316;
font-weight:bold;
}

.tabs{
display:flex;
overflow:auto;
background:#1e293b;
}

.tab{
padding:14px 18px;
cursor:pointer;
white-space:nowrap;
}

.tab:hover{
background:#334155;
}

.container{
padding:20px;
}

.match{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:12px;
margin-bottom:10px;
border-radius:8px;
}

.teams{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:26px;
height:26px;
}

.tip{
font-weight:bold;
font-size:18px;
}

.tip1{color:#22c55e;}
.tipx{color:#facc15;}
.tip2{color:#ef4444;}

.league{
display:none;
}

</style>

<script>

function showLeague(name){

    let leagues=document.querySelectorAll(".league")

    leagues.forEach(l=>{
        l.style.display="none"
    })

    document.getElementById(name).style.display="block"
}

</script>

</head>

<body>

<header>⚽ DjepetoTip</header>

<div class="tabs">

{% for league in leagues.keys() %}

<div class="tab" onclick="showLeague('{{league}}')">
{{league}}
</div>

{% endfor %}

</div>

<div class="container">

{% for league, matches in leagues.items() %}

<div class="league" id="{{league}}">

<h2>{{league}}</h2>

{% for m in matches %}

<div class="match">

<div class="teams">

<img src="{{m.home_logo}}" class="logo">

{{m.home}}

vs

<img src="{{m.away_logo}}" class="logo">

{{m.away}}

</div>

<div class="tip
{% if m.tip == '1' %}tip1{% endif %}
{% if m.tip == 'X' %}tipx{% endif %}
{% if m.tip == '2' %}tip2{% endif %}
">

{{m.tip}} ({{m.prob}}%)

</div>

</div>

{% endfor %}

</div>

{% endfor %}

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){
    let first=document.querySelector(".league")
    if(first){
        first.style.display="block"
    }
})

</script>

</body>
</html>
